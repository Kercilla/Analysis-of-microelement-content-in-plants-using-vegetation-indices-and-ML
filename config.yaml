# ═══════════════════════════════════════════════════════════
#  config.yaml — единый конфиг проекта
# ═══════════════════════════════════════════════════════════

# ── Пути к данным ──────────────────────────────────────────

paths:
  # Мультиспектральные .gpkg файлы
  multi:
    date1: "D:/Diplom_Magistr/experience_2023/multik/20230529/1?_05_29.gpkg"      
    date2: "D:/Diplom_Magistr/experience_2023/multik/20230608/1?_06_08.gpkg"      

  # Гиперспектральные данные
  hyper:
    date1_folder: "D:/Diplom_Magistr/experience_2023/Giper/polygon/20230529"
    date2_folder: "D:/Diplom_Magistr/experience_2023/Giper/polygon/20230608"
    wavelength_map: "D:/Diplom_Magistr/experience_2023/Giper/polygon/giper_polygon.xlsx"
    # Собранные xlsx (если папки недоступны)
    #date1_xlsx: "D:/Diplom_Magistr/Analysis of microelement content in plants using vegetation indices and ML/V6/data/hyper/hyper_aggregated_date1.xlsx"
    #date2_xlsx: "D:/Diplom_Magistr/Analysis of microelement content in plants using vegetation indices and ML/V6/data/hyper/hyper_aggregated_date2.xlsx"

  # Химический анализ
  chemistry:
    sampling1: "D:/Diplom_Magistr/experience_2023/Хим_Лаб_АФИ/1_05_29.xlsx"
    sampling2: "D:/Diplom_Magistr/experience_2023/Хим_Лаб_АФИ/2_06_08.xlsx"

  # Выходные папки
  output:
    stat_multi:  "results/01_stat_multi"
    stat_hyper:  "results/02_stat_hyper"
    ml_multi:    "results/03_ml_multi"
    ml_hyper:    "results/04_ml_hyper"
    ml_fusion:   "results/05_ml_fusion"


# ── Камера MicaSense RedEdge-M ─────────────────────────────

camera:
  name: "MicaSense RedEdge-M"
  # Номер из имени файла → название канала
  # Файлы: 11_05_29.gpkg, 12_05_29.gpkg, ..., 15_05_29.gpkg
  band_map:
    "11": "Blue"
    "12": "Green"
    "13": "Red"
    "14": "RedEdge"
    "15": "NIR"
  wavelengths:
    Blue: 475.0
    Green: 560.0
    Red: 668.0
    RedEdge: 717.0
    NIR: 840.0


# ── Гиперспектр: правила парсинга имён файлов ─────────────

hyper_naming:
  prefix_length: 1
  file_extension: ".gpkg"
  # Столбцы в .gpkg
  value_column: "_mean"
  id_column: "id"
  # Минимум валидных каналов для включения точки
  min_valid_bands: 50


# ── Химический анализ ──────────────────────────────────────

chemistry:
  # ID offset: для 2-го отбора пробы 101-200 → точки 1-100
  id_offsets:
    sampling1: 0
    sampling2: 0
  # Названия столбцов в .doc файлах (16 штук после ID)
  columns:
    - "Биомасса_сырая_г"
    - "Биомасса_сухая_г"
    - "Влажность_%"
    - "Сырая_зола_%"
    - "N_%"
    - "P_%"
    - "K_%"
    - "Ca_%"
    - "Mg_%"
    - "S_%"
    - "Нитраты_мг_кг"
    - "Fe_мг_кг"
    - "Mn_мг_кг"
    - "Cu_мг_кг"
    - "Zn_мг_кг"
    - "Co_мг_кг"
  # Целевые элементы для анализа (без служебных)
  target_elements:
    - "N_%"
    - "P_%"
    - "K_%"
    - "Ca_%"
    - "Mg_%"
    - "S_%"
    - "Нитраты_мг_кг"
    - "Fe_мг_кг"
    - "Mn_мг_кг"
    - "Cu_мг_кг"
    - "Zn_мг_кг"
    - "Co_мг_кг"
  # Короткие имена для графиков
  short_names:
    "N_%": "N"
    "P_%": "P"
    "K_%": "K"
    "Ca_%": "Ca"
    "Mg_%": "Mg"
    "S_%": "S"
    "Нитраты_мг_кг": "NO₃"
    "Fe_мг_кг": "Fe"
    "Mn_мг_кг": "Mn"
    "Cu_мг_кг": "Cu"
    "Zn_мг_кг": "Zn"
    "Co_мг_кг": "Co"
  date_sampling_map:
    "date1": "sampling1"
    "date2": "sampling2"
    "05_29": "sampling1"
    "06_08": "sampling2"
    "20230529": "sampling1"
    "20230608": "sampling2"


# ── Параметры статистического анализа ──────────────────────

statistics:
  methods: ["pearson", "spearman", "kendall"]
  alpha: 0.05
  index_tiers: [1, 2, 3]      # Тиры вегетативных индексов
  min_samples: 10              # Мин. точек для корреляции
  scatter_top_n: 12

# Предобработки гиперспектра
hyper_preprocessing:
  variants:
    raw:        ["smooth"]
    deriv1:     ["smooth", "deriv1"]
    deriv1_snv: ["smooth", "deriv1", "snv"]
    snv:        ["snv"]
    deriv2:     ["smooth", "deriv2"]
  sg_window: 11
  sg_polyorder: 2


# ── Параметры ML ───────────────────────────────────────────

ml:
  multi_pca_components: 15 
  mixup_n_aug: null
  models: ["PLSR", "ElasticNet", "RF", "GBR", "SVR", "XGBoost"]
  cv_folds: 5
  cv_strategy: "kfold"         # kfold | repeated_kfold | spatial
  # Feature sets для гиперспектра
  hyper_feature_sets:
    - "raw_smooth"
    - "deriv1_snv"
    - "pca_10"
    - "cars_spa_25"
    - "vip"
  hyper_pca_components: 10
  hyper_selected_bands: 25


# ── Визуализация ───────────────────────────────────────────

plots:
  dpi: 150
  format: "png"
